{{- if and .Values.postgresql.enabled (gt (int .Values.postgresql.replicaCount) 1) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgresql-ha.fullname" . }}-replica
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgresql-ha.labels" . | nindent 4 }}
    app.kubernetes.io/component: replica
  annotations:
    # Route read-only queries to replicas to distribute load off the primary.
    service.alpha.kubernetes.io/tolerate-unready-endpoints: "false"
spec:
  type: ClusterIP
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
      protocol: TCP
  selector:
    {{- include "postgresql-ha.replicaSelectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgresql-ha.fullname" . }}-replica-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgresql-ha.labels" . | nindent 4 }}
    app.kubernetes.io/component: replica
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
      protocol: TCP
  selector:
    {{- include "postgresql-ha.replicaSelectorLabels" . | nindent 4 }}
{{- end }}
