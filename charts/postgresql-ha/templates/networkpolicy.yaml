{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "postgresql-ha.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgresql-ha.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "postgresql-ha.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
  ingress:
    # Allow intra-cluster replication between primary and replicas.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "postgresql-ha.name" . }}
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: 5432
          protocol: TCP
    # Allow PgBouncer to connect to PostgreSQL.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: pgbouncer
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: 5432
          protocol: TCP
    # Allow backup job pods to connect for pg_dump.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: backup
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: 5432
          protocol: TCP
    {{- if .Values.networkPolicy.allowNamespaces }}
    # Allow connections from explicitly permitted namespaces.
    {{- range .Values.networkPolicy.allowNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .name | quote }}
      ports:
        - port: 5432
          protocol: TCP
    {{- end }}
    {{- end }}
{{- end }}
