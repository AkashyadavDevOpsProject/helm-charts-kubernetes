{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "postgresql-ha.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgresql-ha.labels" . | nindent 4 }}
data:
  pgbouncer.ini: |
    [databases]
    {{ .Values.postgresql.auth.database | default "*" }} = host={{ include "postgresql-ha.fullname" . }}-primary port=5432 dbname={{ .Values.postgresql.auth.database | default "*" }}

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 5432
    auth_type = scram-sha-256
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = {{ .Values.pgbouncer.poolMode }}
    max_client_conn = {{ .Values.pgbouncer.maxClientConn }}
    default_pool_size = {{ .Values.pgbouncer.defaultPoolSize }}
    min_pool_size = {{ .Values.pgbouncer.minPoolSize }}
    reserve_pool_size = {{ .Values.pgbouncer.reservePoolSize }}
    reserve_pool_timeout = 5
    server_reset_query = DISCARD ALL
    server_check_delay = 30
    server_check_query = select 1
    application_name_add_host = 1
    log_connections = 1
    log_disconnections = 1
    log_pooler_errors = 1
    stats_period = 60
    ignore_startup_parameters = extra_float_digits,search_path
{{- end }}
