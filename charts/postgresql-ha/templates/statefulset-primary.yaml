{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "postgresql-ha.fullname" . }}-primary
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgresql-ha.labels" . | nindent 4 }}
    app.kubernetes.io/component: primary
spec:
  serviceName: {{ include "postgresql-ha.fullname" . }}-primary-headless
  replicas: 1
  selector:
    matchLabels:
      {{- include "postgresql-ha.primarySelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "postgresql-ha.labels" . | nindent 8 }}
        app.kubernetes.io/component: primary
    spec:
      serviceAccountName: {{ include "postgresql-ha.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      terminationGracePeriodSeconds: 60
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          env:
            - name: BITNAMI_DEBUG
              value: "false"
            - name: POSTGRESQL_VOLUME_DIR
              value: "/bitnami/postgresql"
            - name: PGDATA
              value: "/bitnami/postgresql/data"
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | default "postgres" | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database | default "postgres" | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgresql-ha.secretName" . }}
                  key: {{ .Values.postgresql.auth.secretKeys.adminPasswordKey }}
            - name: REPMGR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgresql-ha.secretName" . }}
                  key: {{ .Values.postgresql.auth.secretKeys.replicationPasswordKey }}
            - name: REPMGR_PRIMARY_HOST
              value: {{ include "postgresql-ha.fullname" . }}-primary-0.{{ include "postgresql-ha.fullname" . }}-primary-headless.{{ .Release.Namespace }}.svc.cluster.local
            - name: REPMGR_PARTNER_NODES
              value: {{ include "postgresql-ha.fullname" . }}-primary-0.{{ include "postgresql-ha.fullname" . }}-primary-headless.{{ .Release.Namespace }}.svc.cluster.local
            - name: REPMGR_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: REPMGR_NODE_NETWORK_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U {{ .Values.postgresql.auth.username | default "postgres" | quote }} -d {{ .Values.postgresql.auth.database | default "postgres" | quote }} -h 127.0.0.1 -p 5432
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - exec pg_isready -U {{ .Values.postgresql.auth.username | default "postgres" | quote }} -d {{ .Values.postgresql.auth.database | default "postgres" | quote }} -h 127.0.0.1 -p 5432
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          resources:
            {{- toYaml .Values.postgresql.primary.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /bitnami/postgresql
            - name: tmp
              mountPath: /tmp
        {{- if .Values.postgresql.metrics.enabled }}
        - name: metrics
          image: "{{ .Values.postgresql.metrics.image.repository }}:{{ .Values.postgresql.metrics.image.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
          env:
            - name: DATA_SOURCE_URI
              value: "127.0.0.1:5432/{{ .Values.postgresql.auth.database | default "postgres" }}?sslmode=disable"
            - name: DATA_SOURCE_USER
              value: {{ .Values.postgresql.auth.username | default "postgres" | quote }}
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "postgresql-ha.secretName" . }}
                  key: {{ .Values.postgresql.auth.secretKeys.adminPasswordKey }}
          ports:
            - name: metrics
              containerPort: 9187
              protocol: TCP
          resources:
            {{- toYaml .Values.postgresql.metrics.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "postgresql-ha.labels" . | nindent 10 }}
          app.kubernetes.io/component: primary
      spec:
        accessModes:
          {{- toYaml .Values.postgresql.primary.persistence.accessModes | nindent 10 }}
        storageClassName: {{ .Values.postgresql.primary.persistence.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.postgresql.primary.persistence.size | quote }}
{{- end }}
