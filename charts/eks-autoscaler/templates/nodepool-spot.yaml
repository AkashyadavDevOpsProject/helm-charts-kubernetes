{{- if .Values.karpenter.nodePools.spot.enabled }}
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ include "eks-autoscaler.fullname" . }}-spot
  labels:
    {{- include "eks-autoscaler.labels" . | nindent 4 }}
spec:
  template:
    metadata:
      labels:
        karpenter.sh/nodepool: spot
        node-type: spot
        workload-type: spot
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: {{ include "eks-autoscaler.fullname" . }}-default

      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            {{- toYaml .Values.karpenter.nodePools.spot.capacityType | nindent 12 }}

        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            {{- toYaml .Values.karpenter.nodePools.spot.instanceTypes | nindent 12 }}

        - key: kubernetes.io/arch
          operator: In
          values:
            - arm64

        - key: kubernetes.io/os
          operator: In
          values:
            - linux

        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          # Require 6th gen+ for Spot as well — older instances often have worse Spot pricing.
          values:
            - "5"

      # taints: Spot nodes are tainted to prevent workloads that cannot tolerate
      # interruption from being scheduled here unintentionally.
      taints:
        - key: karpenter.sh/capacity-type
          value: spot
          effect: NoSchedule

      # expireAfter: Rotate Spot nodes every 168h (7 days) regardless of utilization.
      # Reduces the blast radius of any single long-running Spot instance.
      expireAfter: 168h

  limits:
    cpu: {{ .Values.karpenter.nodePools.spot.limits.cpu | quote }}
    memory: {{ .Values.karpenter.nodePools.spot.limits.memory | quote }}

  disruption:
    consolidationPolicy: {{ .Values.karpenter.nodePools.spot.disruption.consolidationPolicy }}
    consolidateAfter: {{ .Values.karpenter.nodePools.spot.disruption.consolidateAfter }}
    budgets:
      - nodes: "20%"

  weight: {{ .Values.karpenter.nodePools.spot.weight }}
{{- end }}
