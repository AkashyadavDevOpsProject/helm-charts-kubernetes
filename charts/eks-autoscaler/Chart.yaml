apiVersion: v2
name: eks-autoscaler
description: |
  Autoscaling configuration for Amazon EKS using Karpenter NodePools,
  EC2NodeClass, Horizontal Pod Autoscaler, and Vertical Pod Autoscaler.
  Supports On-Demand, Spot, and GPU node pools with configurable instance
  families and consolidation policies. Implements the node strategy used
  across production EKS clusters running FinTech payment workloads —
  AL2023 AMI, gp3 encrypted EBS, IMDSv2 required, Spot interruption handling.
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - karpenter
  - hpa
  - vpa
  - autoscaling
  - eks
  - spot
  - graviton
  - fintech
  - cost-optimization
home: https://github.com/AkashyadavDevOpsProject/helm-charts-kubernetes
sources:
  - https://github.com/AkashyadavDevOpsProject/helm-charts-kubernetes/tree/main/charts/eks-autoscaler
maintainers:
