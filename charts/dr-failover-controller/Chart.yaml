apiVersion: v2
name: dr-failover-controller
description: |
  Disaster Recovery failover controller for multi-region AWS deployments.
  Runs as a Kubernetes CronJob that monitors primary region health via HTTP
  checks, Aurora replication lag, and ElastiCache availability. Triggers
  Route 53 DNS failover automatically or with manual approval via SNS
  notification. Includes Grafana dashboard for DR status visibility.
  Implements the active-passive DR pattern across ap-south-1 and ap-south-2
  with RPO under 3 hours and RTO under 30 minutes.
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - disaster-recovery
  - route53
  - failover
  - multi-region
  - aws
  - dr
  - sns
  - aurora
  - elasticache
  - eks
home: https://github.com/AkashyadavDevOpsProject/helm-charts-kubernetes
sources:
