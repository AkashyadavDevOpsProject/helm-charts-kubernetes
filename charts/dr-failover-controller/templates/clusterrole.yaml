{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dr-failover-controller.fullname" . }}
  labels:
    {{- include "dr-failover-controller.labels" . | nindent 4 }}
rules:
  # Read cluster health state to inform DR decisions.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
  # Read ConfigMaps for DR state persistence across CronJob runs.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create"]
{{- end }}
---
{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dr-failover-controller.fullname" . }}
  labels:
    {{- include "dr-failover-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "dr-failover-controller.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "dr-failover-controller.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
