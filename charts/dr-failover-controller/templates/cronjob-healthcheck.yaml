{{- if .Values.controller.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "dr-failover-controller.fullname" . }}-healthcheck
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dr-failover-controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: healthcheck
spec:
  schedule: {{ .Values.controller.schedule | quote }}
  timeZone: "UTC"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "dr-failover-controller.labels" . | nindent 12 }}
            app.kubernetes.io/component: healthcheck
        spec:
          serviceAccountName: {{ include "dr-failover-controller.serviceAccountName" . }}
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          containers:
            - name: health-check
              image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
              imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
              command:
                - /bin/sh
                - /scripts/health-check.sh
              env:
                - name: PRIMARY_ENDPOINT
                  value: {{ .Values.controller.healthChecks.primary.endpoint | quote }}
                - name: EXPECTED_STATUS_CODE
                  value: {{ .Values.controller.healthChecks.primary.expectedStatusCode | quote }}
                - name: TIMEOUT_SECONDS
                  value: {{ .Values.controller.healthChecks.primary.timeoutSeconds | quote }}
                - name: CONSECUTIVE_FAILURE_THRESHOLD
                  value: {{ .Values.controller.healthChecks.primary.consecutiveFailures | quote }}
                - name: AURORA_CHECK_ENABLED
                  value: {{ .Values.controller.healthChecks.aurora.checkEnabled | quote }}
                - name: AURORA_CLUSTER_IDENTIFIER
                  value: {{ .Values.controller.healthChecks.aurora.clusterIdentifier | quote }}
                - name: AURORA_LAG_THRESHOLD
                  value: {{ .Values.controller.healthChecks.aurora.replicationLagThresholdSeconds | quote }}
                - name: ELASTICACHE_CHECK_ENABLED
                  value: {{ .Values.controller.healthChecks.elasticache.checkEnabled | quote }}
                - name: ELASTICACHE_PRIMARY_ENDPOINT
                  value: {{ .Values.controller.healthChecks.elasticache.primaryEndpoint | quote }}
                - name: AWS_REGION
                  value: {{ .Values.controller.aws.region | quote }}
                - name: AWS_PRIMARY_REGION
                  value: {{ .Values.controller.aws.region | quote }}
                - name: AWS_DR_REGION
                  value: {{ .Values.controller.aws.drRegion | quote }}
                - name: ROUTE53_HOSTED_ZONE_ID
                  value: {{ .Values.controller.failover.route53.hostedZoneId | quote }}
                - name: ROUTE53_PRIMARY_RECORD
                  value: {{ .Values.controller.failover.route53.primaryRecordName | quote }}
                - name: ROUTE53_DR_RECORD
                  value: {{ .Values.controller.failover.route53.drRecordName | quote }}
                - name: AUTO_FAILOVER
                  value: {{ .Values.controller.failover.route53.autoFailover | quote }}
                - name: SNS_ENABLED
                  value: {{ .Values.controller.failover.sns.enabled | quote }}
                - name: SNS_TOPIC_ARN
                  value: {{ .Values.controller.failover.sns.topicArn | quote }}
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: state
                  mountPath: /tmp
          volumes:
            - name: scripts
              configMap:
                name: {{ include "dr-failover-controller.fullname" . }}-scripts
                defaultMode: 0755
            - name: state
              emptyDir: {}
{{- end }}
