apiVersion: v2
name: devsecops-pipeline
description: |
  GitLab CI/CD runner deployment on Amazon EKS with integrated security
  tooling — Trivy container scanning, OPA Gatekeeper policy enforcement,
  and HashiCorp Vault agent for secrets injection. Implements the DevSecOps
  pipeline pattern used in SOC 2 Type II compliant FinTech environments.
  Runners execute in Kubernetes pods with ephemeral build environments,
  no persistent state, and IRSA-based AWS authentication.
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - gitlab
  - runner
  - trivy
  - vault
  - opa
  - devsecops
  - soc2
  - fintech
  - eks
  - cicd
home: https://github.com/AkashyadavDevOpsProject/helm-charts-kubernetes
sources:
  - https://github.com/AkashyadavDevOpsProject/helm-charts-kubernetes/tree/main/charts/devsecops-pipeline
