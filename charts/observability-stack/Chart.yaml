apiVersion: v2
name: observability-stack
description: |
  Complete Kubernetes observability stack for Amazon EKS.
  Deploys Prometheus with ServiceMonitor support, Grafana with pre-configured
  datasources and dashboards, Loki for log aggregation, and Alertmanager with
  Slack integration. Pre-built alert rules for EKS nodes, pods, PVCs, Aurora
  replication lag, and RabbitMQ queue depth. Persistent storage on gp3.
  Used in production SOC 2 Type II compliant FinTech payment environments.
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - prometheus
  - grafana
  - loki
  - alertmanager
  - observability
  - monitoring
  - eks
  - fintech
  - soc2
home: https://github.com/AkashyadavDevOpsProject/helm-charts-kubernetes
sources:
  - https://github.com/AkashyadavDevOpsProject/helm-charts-kubernetes/tree/main/charts/observability-stack
maintainers:
  - name: Akash Yadav
    email: akashyadavdevops@gmail.com
    url: https://linkedin.com/in/akash-yadav-devops
dependencies:
  - name: prometheus
    version: "25.x.x"
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  - name: grafana
    version: "7.x.x"
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
  - name: loki
    version: "5.x.x"
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled
